services:
  gateway-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: gateway-api
    restart: unless-stopped
    ports:
      - "8421:8421"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      gateway-db:
        condition: service_healthy
      gateway-redis:
        condition: service_healthy
    networks:
      - gateway-net

  gateway-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: production
    container_name: gateway-web
    restart: unless-stopped
    ports:
      - "3050:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-self-hosted}
    depends_on:
      - gateway-api
    networks:
      - gateway-net

  gateway-worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: production
    container_name: gateway-worker
    restart: unless-stopped
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    depends_on:
      gateway-db:
        condition: service_healthy
      gateway-redis:
        condition: service_healthy
    networks:
      - gateway-net

  gateway-db:
    image: postgres:16-alpine
    container_name: gateway-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway-net

  gateway-redis:
    image: redis:7-alpine
    container_name: gateway-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - gateway-net

volumes:
  pgdata:
  redisdata:

networks:
  gateway-net:
    driver: bridge
